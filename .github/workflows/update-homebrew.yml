name: Update Homebrew Cask

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: macos-latest
    if: "!github.event.release.prerelease"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release DMGs and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          gh release download "v${VERSION}" \
            --pattern "*aarch64*.dmg" \
            --dir /tmp/dmgs

          gh release download "v${VERSION}" \
            --pattern "*x64*.dmg" \
            --dir /tmp/dmgs

          ls -lh /tmp/dmgs/

          ARM64_SHA=$(shasum -a 256 /tmp/dmgs/*aarch64*.dmg | awk '{print $1}')
          X64_SHA=$(shasum -a 256 /tmp/dmgs/*x64*.dmg | awk '{print $1}')

          echo "arm64_sha=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "x64_sha=${X64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update cask formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARM64_SHA="${{ steps.sha.outputs.arm64_sha }}"
          X64_SHA="${{ steps.sha.outputs.x64_sha }}"

          cat > Casks/nightflow.rb << EOF
          cask "nightflow" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/theja-vanka/NightFlow/releases/download/v#{version}/NightFlow_#{version}_aarch64.dmg",
                  verified: "github.com/theja-vanka/NightFlow/"
              sha256 "${ARM64_SHA}"
            end

            on_intel do
              url "https://github.com/theja-vanka/NightFlow/releases/download/v#{version}/NightFlow_#{version}_x64.dmg",
                  verified: "github.com/theja-vanka/NightFlow/"
              sha256 "${X64_SHA}"
            end

            name "NightFlow"
            desc "Desktop app for managing and analyzing deep learning experiments"
            homepage "https://github.com/theja-vanka/NightFlow"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :ventura"

            app "NightFlow.app"

            zap trash: [
              "~/Library/Application Support/com.nightflow.desktop",
              "~/Library/Caches/com.nightflow.desktop",
              "~/Library/Preferences/com.nightflow.desktop.plist",
              "~/Library/Saved Application State/com.nightflow.desktop.savedState",
              "~/Library/WebKit/com.nightflow.desktop",
            ]
          end
          EOF

          # Fix indentation (remove leading spaces from heredoc)
          sed -i '' 's/^          //' Casks/nightflow.rb

      - name: Commit and push updated cask
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/nightflow.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update Homebrew cask to v${{ steps.version.outputs.version }}"
          git push
